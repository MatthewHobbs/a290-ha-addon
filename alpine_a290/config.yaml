name: Alpine A290
version: "1.17.0"
slug: alpine_a290
description: Polls your Alpine A290 (Renault/Kamereon API) and publishes its data to Home Assistant via MQTT auto-discovery. Credentials are entered once on the Configuration page.
url: https://github.com/MatthewHobbs/a290-ha-addon/tree/main/alpine_a290
# Pre-built multi-arch image published to GHCR by .github/workflows/release.yaml, with a
# keyless (GitHub OIDC) build-provenance attestation pushed alongside it. With this set, the
# Supervisor pulls the image instead of building it on the user's device. The GHCR package
# must be public. Verify: gh attestation verify oci://ghcr.io/matthewhobbs/alpine_a290:<ver>
# --owner MatthewHobbs
image: ghcr.io/matthewhobbs/alpine_a290
arch:
  - aarch64
  - amd64
init: false
# Read-only status panel in the HA sidebar (ingress; auth-gated by HA). Served by the
# poller's own HTTP server on the health port — no extra Supervisor role, no config writes.
ingress: true
panel_icon: mdi:car-sports
panel_title: Alpine A290
# Talk to the HA core API (used to auto-deploy the dashboard, when enabled).
homeassistant_api: true
# Pull MQTT broker connection from the Mosquitto add-on automatically.
services:
  - mqtt:need
options:
  username: ""
  password: ""
  account_id: ""
  vin: ""
  locale: en_GB
  poll_interval: 300
  battery_capacity_kwh: "52"
  stale_hours: 6
  publish_location: true
  gps_precision: 4
  precondition_temperature: 20
  log_level: info
  debug_dump: false
  deploy_dashboard: standard
  dashboard_url_path: alpine-a290
  redeploy_dashboard: false
  charger_smart_charge: ""
  charger_bump_charge: ""
  charger_target_soc: ""
  charger_target_time: ""
  charger_dispatching: ""
schema:
  username: str
  password: password
  account_id: str?
  vin: str
  locale: list(bg_BG|cs_CZ|da_DK|de_AT|de_CH|de_DE|en_GB|en_IE|es_ES|es_MX|fi_FI|fr_BE|fr_CH|fr_FR|fr_LU|hr_HR|hu_HU|it_CH|it_IT|nl_BE|nl_NL|no_NO|pl_PL|pt_PT|ro_RO|ru_RU|sk_SK|sl_SI|sv_SE)
  poll_interval: int(60,3600)
  battery_capacity_kwh: list(52|40)
  stale_hours: int(1,48)
  publish_location: bool
  gps_precision: int(1,6)
  precondition_temperature: float(16,27)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  debug_dump: bool
  deploy_dashboard: list(none|standard|bubble|both)
  dashboard_url_path: str
  redeploy_dashboard: bool
  charger_smart_charge: str?
  charger_bump_charge: str?
  charger_target_soc: str?
  charger_target_time: str?
  charger_dispatching: str?
